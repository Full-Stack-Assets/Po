services:
  - type: web
    name: po-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn orchestrator_agent.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: PO_CORS_ORIGINS
        value: https://full-stack-assets.github.io
      - key: PYTHON_VERSION
        value: "3.12"
